name: Isometric calendar metrics

on:
  schedule:
    - cron: "0 3 * * *"   # una vez al día
  workflow_dispatch:       # botón manual "Run workflow"

jobs:
  isocalendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: HectorJarque
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_output: svg
          committer_branch: output
          committer_message: "docs: update isometric calendar"
          filename: isocalendar.svg